onSurface = '#E5E1E9'
background = '#1D1D23'
foreground = '#B1A8A2'
black = '#1D1D23'
red = '#D584BB'
green = '#83C4C9'
yellow = '#E3A5AC'
blue = '#8EA6D2'
magenta = '#B49EC7'
cyan = '#90CAE8'
white = '#B1A8A2'
bright_black = '#928F9A'
bright_red = '#E3ABD0'
